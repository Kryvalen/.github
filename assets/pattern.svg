<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <pattern id="kryvalenGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      
      <!-- subtle grid lines -->
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#000000" stroke-opacity="0.06" stroke-width="1"/>

      <!-- nodes (system points) -->
      <circle cx="0" cy="0" r="1.5" fill="#000000" fill-opacity="0.15"/>
      <circle cx="40" cy="0" r="1.5" fill="#000000" fill-opacity="0.10"/>
      <circle cx="0" cy="40" r="1.5" fill="#000000" fill-opacity="0.10"/>
      <circle cx="40" cy="40" r="1.5" fill="#000000" fill-opacity="0.15"/>

      <!-- central micro-node (system anchor) -->
      <circle cx="20" cy="20" r="1.2" fill="#000000" fill-opacity="0.08"/>

    </pattern>
  </defs>

  <!-- full fill -->
  <rect width="100%" height="100%" fill="url(#kryvalenGrid)"/>

</svg>